info:
  name: Container Cards Log Groupby HBL_NUMBER_SHIPMENT
  type: http
  seq: 15

http:
  method: POST
  url: "{{baseurl}}/api_gateway/v1/models/cs.control.log/get"
  body:
    type: json
    data: |-
      {
         "params" : {
              "fields": "ata_port_border,customer_id,consignee_id,hbl_number,invoice_number,ata_port_border,vai_port_border_id",
              "expand": true,
              "page": 2,
              "limit": 10
              ,"map_domain": "cs_control_log"
      //         ,"domain": [["cs_control_log","=","00a_pending"]]
           
              ,"order": "id desc"
             ,"is_query": 0
         }
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
