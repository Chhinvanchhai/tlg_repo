info:
  name: Shipment Tracking md
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseurl}}/api_gateway/v1/models/shipment.tracking.md/search_tracking/0"
  body:
    type: json
    data: |+
      {
         "params" : {
              "fields": "ata_port_border,customer_id,consignee_id,hbl_number,invoice_number,ata_port_border,vai_port_border_id",
              "expand": true,
              "page": 1,
              "limit": 10
              ,"domain": [ 
                          [
                              "hbl_number",
                              "in",
                              ["015GX06508"]
                          ]
                         ]

         }
      }

  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
