info:
  name: Shipment Logs Status
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseurl}}/api_gateway/v1/models/cs.control.log/get"
  body:
    type: json
    data: |-
      {
        "params" : {
              
        "groupby": "dynamic_port_status,cs_control_log,depot_dp_status,leden_cntr_fee_time_completed,pnh_dp_getin_getout_status,port_and_dryport_deli_add_plan,delivery_status,shipment_cancel_delete,sto_day_status,completed_sto_day_status,dem_day_status,completed_dem_day_status,det_day_status,complete_det_day_status,det_dem_day_status,complete_det_dem_day_status,leden_cntr_fee_time",
          "order": "id desc"
          ,
        "domain_groupby": [
          ["dynamic_port_status", "=", "BAVET"]
        ],
          "keep_zero": false
           
        }
        
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
